name: Regenerate and upload dataset

on:
  workflow_dispatch:        # manual trigger
  schedule:
    - cron: '0 4 1 * *'    # 1st of every month at 04:00 UTC

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('wordnet')"

      - name: Build lexicon pickle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          jupyter nbconvert --to notebook --execute --inplace 01_lexicons.ipynb \
            --ExecutePreprocessor.timeout=120

      - name: Score movies and export CSV
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          jupyter nbconvert --to notebook --execute --inplace 02_score_and_export.ipynb \
            --ExecutePreprocessor.timeout=600

      - name: Upload dataset version to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          kaggle datasets version -p output -m "Automated monthly refresh $(date +%Y-%m-%d)"

      - name: Push analysis notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          kaggle kernels push -p .
