name: TMDB Keyword SCL Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 * *'   # 1st of every month at 04:00 UTC

env:
  KAGGLE_TOKEN: ${{ secrets.KAGGLE_TOKEN }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('wordnet'); nltk.download('omw-1.4')"

      # ── Refresh TMDB source data ────────────────────────────────────────
      - name: 00 — Download TMDb keyword export (daily gz)
        run: |
          jupyter nbconvert --to notebook --execute --inplace 00_tmdb_keyword_download.ipynb \
            --ExecutePreprocessor.timeout=120

      - name: Download TMDB daily exports (movies, companies, collections)
        run: python scripts/download_tmdb_exports.py

      - name: Fetch new / updated movies from TMDB API
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: python scripts/fetch_new_movies.py

      - name: Strip keywords not in canonical snapshot
        run: |
          python3 - <<'EOF'
          import pandas as pd
          df    = pd.read_csv("data/tmdb_movies_clean.csv", low_memory=False)
          canon = set(pd.read_csv("data/tmdb_keywords_canonical.csv")["name"].str.lower().str.strip())

          def filter_keywords(cell):
              if not isinstance(cell, str) or not cell.strip():
                  return None
              kept = [kw for kw in cell.split(", ") if kw.strip().lower() in canon]
              return ", ".join(kept) if kept else None

          before = df["keywords"].notna().sum()
          df["keywords"] = df["keywords"].apply(filter_keywords)
          after  = df["keywords"].notna().sum()
          print(f"Movies with keywords: {before:,} -> {after:,}")
          df.to_csv("data/tmdb_movies_clean.csv", index=False)
          EOF

      - name: Copy movies clean to output dir
        run: |
          mkdir -p output/tmdb-movies-clean
          cp data/tmdb_movies_clean.csv output/tmdb-movies-clean/tmdb_movies_clean.csv

      # ── Core pipeline: 04 → 06 → 07 → 08 → 09 ─────────────────────────
      - name: 04 — Build keyword lexicon (NRC emotion + VAD scores per keyword)
        run: |
          jupyter nbconvert --to notebook --execute --inplace 04_keyword_lexicon.ipynb \
            --ExecutePreprocessor.timeout=600

      - name: 06 — Build SCL joined lexicon (OPP + NMA + VAD hierarchy)
        run: |
          jupyter nbconvert --to notebook --execute --inplace 06_scl_join.ipynb \
            --ExecutePreprocessor.timeout=300

      - name: 07 — Score keyword valence + classify types (exclude_from_scl)
        run: |
          jupyter nbconvert --to notebook --execute --inplace 07_keyword_valence.ipynb \
            --ExecutePreprocessor.timeout=300

      - name: 08 — Movie quality labels (real vs spam, theatrical flag)
        run: |
          jupyter nbconvert --to notebook --execute --inplace 08_movie_quality_filter.ipynb \
            --ExecutePreprocessor.timeout=300

      - name: 09 — Final pipeline (exploded + aggregate movie scores)
        run: |
          jupyter nbconvert --to notebook --execute --inplace 09_final_pipeline.ipynb \
            --ExecutePreprocessor.timeout=600

      - name: Copy final pipeline outputs to output dirs
        run: |
          mkdir -p output/tmdb-movie-scores output/tmdb-movie-keywords-exploded
          cp data/tmdb_movie_scores.csv output/tmdb-movie-scores/
          cp data/tmdb_movie_keywords_exploded.csv output/tmdb-movie-keywords-exploded/

      # ── Push all datasets to Kaggle via kagglehub ───────────────────────
      - name: Push all datasets to Kaggle
        run: |
          python3 - <<'EOF'
          import kagglehub
          from datetime import date

          kagglehub.login()
          user = kagglehub.whoami(verbose=False)["username"]
          notes = f"Pipeline run {date.today()}"

          datasets = [
              ("tmdb-keyword-enriched",        "output/tmdb-keyword-enriched",        {"ignore_patterns": ["*.json"]}),
              ("tmdb-movies-clean",             "output/tmdb-movies-clean",             {}),
              ("tmdb-keyword-lexicon",          "output/keyword-lexicon",               {}),
              ("tmdb-scl-joined",               "output/scl-joined",                    {}),
              ("tmdb-movie-scores",             "output/tmdb-movie-scores",             {}),
              ("tmdb-movie-keywords-exploded",  "output/tmdb-movie-keywords-exploded",  {}),
          ]

          for slug, path, kwargs in datasets:
              print(f"Uploading {slug} ...")
              kagglehub.dataset_upload(
                  handle=f"{user}/{slug}",
                  local_dataset_dir=path,
                  version_notes=notes,
                  **kwargs,
              )
              print(f"  → kaggle.com/datasets/{user}/{slug}")
          EOF

      # ── Commit executed notebooks back to repo ──────────────────────────
      - name: Commit executed notebooks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '00_tmdb_keyword_download.ipynb' \
                  '04_keyword_lexicon.ipynb' '06_scl_join.ipynb' \
                  '07_keyword_valence.ipynb' '08_movie_quality_filter.ipynb' \
                  '09_final_pipeline.ipynb'
          git diff --staged --quiet || \
            git commit -m "chore: pipeline run $(date +%Y-%m-%d) [skip ci]"
          git push
