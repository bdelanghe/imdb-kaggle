name: Refresh TMDB Movies Dataset

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download TMDB daily exports
        run: python scripts/download_tmdb_exports.py
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

      - name: Build canonical keyword list (Phase 1 — daily export)
        run: python scripts/build_tmdb_canonical.py

      - name: Search API fallback for unmatched keywords (Phase 2)
        run: python scripts/crawl_tmdb_keywords.py
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

      - name: Filter movies to live TMDB entries + fetch new movies
        run: python scripts/fetch_new_movies.py
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

      - name: Strip keywords not in canonical snapshot
        run: |
          python3 - <<'EOF'
          import pandas as pd

          df       = pd.read_csv("data/tmdb_movies_clean.csv", low_memory=False)
          canon    = set(pd.read_csv("data/tmdb_keywords_canonical.csv")["name"].str.lower().str.strip())

          def filter_keywords(cell):
              if not isinstance(cell, str) or not cell.strip():
                  return None
              kept = [kw for kw in cell.split(", ") if kw.strip().lower() in canon]
              return ", ".join(kept) if kept else None

          before = df["keywords"].notna().sum()
          df["keywords"] = df["keywords"].apply(filter_keywords)
          after = df["keywords"].notna().sum()

          print(f"Movies with keywords: {before:,} → {after:,}")
          df.to_csv("data/tmdb_movies_clean.csv", index=False)
          EOF

      - name: Copy to Kaggle output dir
        run: cp data/tmdb_movies_clean.csv output/tmdb-movies-clean/tmdb_movies_clean.csv

      - name: Publish to Kaggle
        run: kaggle datasets version -p output/tmdb-movies-clean -m "Weekly refresh $(date +%Y-%m-%d)" --dir-mode zip
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
